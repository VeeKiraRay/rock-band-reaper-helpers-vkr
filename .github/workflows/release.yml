# .github/workflows/release.yml
name: Package Release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate filtered release notes
        id: notes
        run: |
          NOTES=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD \
            --pretty=format:"- %s" \
            | grep -v -i "^- documentation:" \
            | grep -v -i "^- doc:" \
            | grep -v -i "^- refactor:" \
            | grep -v -i "^- chore:")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          zip -r rb_helper_scripts_vkr.zip \
            rock_band_general_helper_vkr.lua \
            rock_band_vocal_helper_vkr.lua \
            lib/ \
            rock_band_general_helper_vkr/ \
            rock_band_vocal_helper_vkr/

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: rb_helper_scripts_vkr.zip
          body: ${{ steps.notes.outputs.notes }}
